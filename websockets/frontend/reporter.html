<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forum</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="./client_reporter.js" defer type="module"></script>
  </head>
  <body>
    <form id="submit-form" class="d-flex flex-column p-4 align-items-center">
      <input
        type="text"
        name="title"
        id="title"
        class="w-50 p-2 m-2 shadow rounded"
        required
      />
      <select id="topic" class="p-2 m-2 align-self-start" required>
        <option class="p-2" value="Hardmaxxing">Hardmaxxing</option>
        <option class="p-2" value="Softmaxxing">Softmaxxing</option>
        <option class="p-2" value="Ropemaxxing">Ropemaxxing</option>
      </select>
      <textarea
        class="p-2 m-2 border-1 w-100"
        style="min-height: 20rem"
        id="long-text"
        required
      ></textarea>
      <button type="submit">Send Post</button>
      <div class="d-flex m-4 justify-content-around w-25">
        <a href="/index.html">To Main Page</a
        ><a href="/newsreader.html">To Newspage</a>
      </div>
    </form>
  </body>
</html>
