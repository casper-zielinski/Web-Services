<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSocket Chat</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./styles.css" />

    <!-- WebSocket Client Script -->
    <script src="./client.js" defer type="module"></script>
  </head>
  <body
    class="d-flex flex-column align-items-center justify-content-center vh-100 bg-light"
  >
    <noscript>Please activate JavaScript in your browser!</noscript>

    <div class="container text-center">
      <h1 class="mb-3">WebSocket Chat Example</h1>

      <!-- Chat input section -->
      <div class="card shadow-sm p-3 mb-3">
        <span id="status" class="fw-bold text-secondary">Connecting...</span>
        <input
          type="text"
          id="input"
          class="form-control mt-2"
          placeholder="Enter your name"
          disabled
        />
      </div>

      <!-- Chat messages -->
      <div id="content" class="card bg-white shadow-sm p-3"></div>

      <!-- Participant Count -->
      <div id="info" class="mt-2"><span id="count">0</span> Participants</div>
      <div class="d-flex"><a href="/reporter.html">To forum</a></div>
    </div>

    <!-- Bootstrap JS (Optional, only needed for dropdowns or modals) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
