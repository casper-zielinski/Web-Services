name: web-services-project
services:
  db:
    image: postgres:16
    container_name: post-feed-db-test
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: post_feed_test
    ports:
      - "5432:5432"
    volumes:
      - post_feed_data_test:/var/lib/postgresql/data

volumes:
  post_feed_data_test: