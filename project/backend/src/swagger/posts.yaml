openapi: "3.0.0"
info:
  title: Post API
  version: "1.0.0"

components:
  schemas:
    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        text:
          type: string
          example: "Hello World"
        time_stamp:
          type: string
          format: date-time
          example: "2026-04-06T12:00:00.000Z"
        likes:
          type: integer
          example: 0

    GetResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: '#/components/schemas/Post'        
        next_cursor:
          type: integer
          nullable: true
          example: 10

    PostResponse:
      type: object
      properties:
        message:
          type: string
          example: "Successfully created Post"
        insertedPost:
          $ref: '#/components/schemas/Post'
        receivedPost:
          type: object
          properties:
            text:
              type: string
            likes:
              type: integer

paths:
  /posts:
    get:
      summary: Retrieve a paginated list of posts
      tags: [Posts]
      parameters:
        - in: query
          name: cursor
          schema:
            type: integer
          description: ID of the last post from the previous page (for cursor-based pagination)
          example: 0
        - in: query
          name: limit
          schema:
            type: integer
          description: Number of posts to return (default 10)
          example: 10
      responses:
        200:
          description: A paginated list of posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetResponse'
              examples:
                default:
                  summary: Paginated list with 8 posts
                  value:
                    posts:
                      - id: 1
                        text: "OpenAPI is the best"
                        time_stamp: "2026-04-06T12:00:00.000Z"
                        likes: 67
                      - id: 2
                        text: "Swagger is goated"
                        time_stamp: "2026-03-06T12:00:00.000Z"
                        likes: 41
                      - id: 3
                        text: "REST APIs make the world go round"
                        time_stamp: "2026-03-15T09:30:00.000Z"
                        likes: 23
                      - id: 4
                        text: "TypeScript saves lives"
                        time_stamp: "2026-03-20T14:00:00.000Z"
                        likes: 88
                      - id: 5
                        text: "Express is still undefeated"
                        time_stamp: "2026-03-22T11:15:00.000Z"
                        likes: 55
                      - id: 6
                        text: "Drizzle ORM is pretty slick"
                        time_stamp: "2026-03-25T08:45:00.000Z"
                        likes: 30
                      - id: 7
                        text: "Works on my machine? Use Docker."
                        time_stamp: "2026-03-28T16:20:00.000Z"
                        likes: 102
                      - id: 8
                        text: "Pagination is underrated"
                        time_stamp: "2026-04-01T10:00:00.000Z"
                        likes: 14
                      - id: 9
                        text: "Have you tried turning it off and on again?"
                        time_stamp: "2026-04-03T13:00:00.000Z"
                        likes: 77
                      - id: 10
                        text: "Ship it and pray"
                        time_stamp: "2026-04-05T18:30:00.000Z"
                        likes: 99
                    next_cursor: 10
        500:
          description: Internal server error

    post:
      summary: Create a new post
      tags: [Posts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  example: "My first post"
                likes:
                  type: integer
                  example: 0
      responses:
        201:
          description: Post successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        400:
          description: Required fields missing
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Required fields missing"
                  receivedBody:
                    type: object
        500:
          description: Internal server error